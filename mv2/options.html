<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Hide Users Settings</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 1em;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 0.5em;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 4px 8px;
            text-align: left;
        }

        input[type="text"] {
            width: 200px;
        }
    </style>
</head>

<body>
    <h2>Hide Users Extension</h2>
    <label><input type="checkbox" id="enabled"> Enable Hiding</label><br>
    <label>
        Mode:
        <select id="mode">
            <option value="content">Hide Content</option>
            <option value="message">Hide Whole Message</option>
        </select>
    </label>

    <h3>Users</h3>
    <input type="text" id="userInput" placeholder="Enter user name">
    <button id="addUser">Add</button>

    <table id="userTable">
        <thead>
            <tr>
                <th>Family Name</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="options.js"></script>
</body>

</html>
