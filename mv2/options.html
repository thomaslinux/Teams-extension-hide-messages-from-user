<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Hide Users</title>
    <script defer src="options.js"></script>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #ddd;
            padding: 4px;
        }

        input[type="text"] {
            width: 80%;
        }
    </style>
</head>

<body>
    <h3>Hide Users</h3>
    <input id="userInput" type="text" placeholder="Add user..." />
    <button id="addUser">Add</button>

    <label><input type="checkbox" id="hideEntire" /> Hide whole message</label>

    <table id="usersTable">
        <thead>
            <tr>
                <th>Family Name</th>
                <th>Hide</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</body>

</html>
